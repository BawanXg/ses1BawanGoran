    <h1>

    <form action="#" method="POST">
    <label>Full name: </label> <br>
    <input type="text" name="fullname" required> <br><br>

    <label>Email: </label> <br>

    	</option>

    </select> <br><br>

    <input type="checkbox" name="terms" required>I agree to the terms <br><br>
